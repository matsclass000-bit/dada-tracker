<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dada ji Location Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f3f4f6; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #128C7E, #25D366);
    color: #fff; padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 22px; font-weight: 900; }
  header p  { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .live-badge {
    background: rgba(255,255,255,0.25); border-radius: 20px;
    padding: 6px 14px; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 16px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); text-align: center; }
  .stat-num  { font-size: 32px; font-weight: 900; color: #128C7E; }
  .stat-lbl  { font-size: 12px; color: #6b7280; font-weight: 700; margin-top: 4px; }

  .map-frame {
    background: #fff; border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 20px;
  }
  .map-frame h2 { padding: 14px 18px; font-size: 15px; font-weight: 800; color: #1a1a2e; border-bottom: 1px solid #f3f4f6; }
  .map-frame iframe { width: 100%; height: 300px; border: none; display: block; }
  .no-map { padding: 60px 20px; text-align: center; color: #9ca3af; font-weight: 700; }

  .table-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); overflow: hidden; }
  .table-card h2 { padding: 14px 18px; font-size: 15px; font-weight: 800; color: #1a1a2e; border-bottom: 1px solid #f3f4f6; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f9fafb; }
  th { padding: 10px 16px; text-align: left; font-size: 12px; font-weight: 800; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 12px 16px; font-size: 14px; font-weight: 600; color: #1a1a2e; border-top: 1px solid #f3f4f6; }
  tr:hover td { background: #f9fafb; }
  .row-new td { background: #f0fdf4; }
  .open-btn {
    background: #25D366; color: #fff; border: none;
    padding: 6px 12px; border-radius: 8px; font-size: 12px;
    font-family: 'Nunito',sans-serif; font-weight: 800;
    cursor: pointer; text-decoration: none; display: inline-block;
  }
  .open-btn:hover { background: #1da851; }
  .wa-btn {
    background: #128C7E; color: #fff; border: none;
    padding: 6px 12px; border-radius: 8px; font-size: 12px;
    font-family: 'Nunito',sans-serif; font-weight: 800;
    cursor: pointer; margin-left: 6px; text-decoration: none; display: inline-block;
  }
  .wa-btn:hover { background: #0e6b60; }
  .empty { padding: 60px 20px; text-align: center; color: #9ca3af; font-weight: 700; font-size: 16px; }
  .loading { padding: 40px; text-align: center; color: #9ca3af; font-weight: 700; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📍 Dada ji Tracker</h1>
    <p>Live location dashboard — auto-refreshes every 15 seconds</p>
  </div>
  <div class="live-badge"><span class="dot"></span> LIVE</div>
</header>

<div class="container">

  <!-- Stats row -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="total-count">–</div>
      <div class="stat-lbl">Total Locations</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="today-count">–</div>
      <div class="stat-lbl">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="last-time">–</div>
      <div class="stat-lbl">Last Received</div>
    </div>
  </div>

  <!-- Latest location on map -->
  <div class="map-frame">
    <h2>🗺️ Latest Location</h2>
    <div id="map-container"><div class="no-map">No location received yet</div></div>
  </div>

  <!-- History table -->
  <div class="table-card">
    <h2>📋 Location History</h2>
    <div id="table-container"><div class="loading">Loading...</div></div>
  </div>

</div>

<script>
  let lastKnownCount = 0;

  async function fetchLocations() {
    try {
      // This calls our server's GET /locations endpoint
      // The server reads from the database and returns all rows as JSON ✅
      const res  = await fetch('/locations');
      const data = await res.json();

      updateStats(data);
      updateMap(data);
      updateTable(data);

      lastKnownCount = data.length;
    } catch (e) {
      console.error('Failed to fetch:', e);
    }
  }

  function updateStats(data) {
    document.getElementById('total-count').textContent = data.length;

    // Count today's entries
    const today = new Date().toLocaleDateString('en-IN');
    const todayCount = data.filter(r => {
      const d = new Date(r.timestamp).toLocaleDateString('en-IN');
      return d === today;
    }).length;
    document.getElementById('today-count').textContent = todayCount;

    // Last received time
    if (data.length > 0) {
      const t = new Date(data[0].timestamp);
      document.getElementById('last-time').textContent =
        t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    } else {
      document.getElementById('last-time').textContent = '–';
    }
  }

  function updateMap(data) {
    const container = document.getElementById('map-container');
    if (data.length === 0) {
      container.innerHTML = '<div class="no-map">No location received yet.<br>Waiting for Dada ji... 🙏</div>';
      return;
    }
    const latest = data[0];
    // Embed Google Maps with the latest location
    const src = `https://maps.google.com/maps?q=${latest.lat},${latest.lng}&z=15&output=embed`;
    container.innerHTML = `<iframe src="${src}" allowfullscreen></iframe>`;
  }

  function updateTable(data) {
    const container = document.getElementById('table-container');
    if (data.length === 0) {
      container.innerHTML = '<div class="empty">📭 No locations yet. Send Dada ji the link!</div>';
      return;
    }

    let rows = data.map((r, i) => {
      const mapsURL = `https://maps.google.com/?q=${r.lat},${r.lng}`;
      const waMsg   = encodeURIComponent(`Dada ji location: ${mapsURL}`);
      const isNew   = i === 0 ? 'row-new' : '';
      const time    = new Date(r.timestamp).toLocaleString('en-IN');
      return `
        <tr class="${isNew}">
          <td>#${r.id}</td>
          <td>${time}</td>
          <td style="font-family:monospace;font-size:13px;">${r.lat.toFixed(5)}, ${r.lng.toFixed(5)}</td>
          <td>
            <a class="open-btn" href="${mapsURL}" target="_blank">🗺️ Open</a>
            <a class="wa-btn" href="https://wa.me/918287481934?text=${waMsg}" target="_blank">📲 Share</a>
          </td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <table>
        <thead><tr>
          <th>#</th><th>Date &amp; Time</th><th>Coordinates</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // Load immediately
  fetchLocations();

  // Auto-refresh every 15 seconds (this is how dashboards stay "live"!)
  setInterval(fetchLocations, 15000);
</script>
</body>
</html>
