<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Apna Location Bhejo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(145deg, #e8f5e9, #fff8f0, #e3f2fd);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff; border-radius: 32px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    padding: 44px 32px 36px; max-width: 400px; width: 100%;
    text-align: center;
    animation: popIn 0.5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.92) translateY(20px)} to{opacity:1;transform:scale(1)} }
  .icon { font-size: 72px; display: block; margin-bottom: 14px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  h1 { font-size: 28px; font-weight: 900; color: #1a1a2e; margin-bottom: 6px; }
  .hindi { font-size: 22px; font-weight: 800; color: #128C7E; margin-bottom: 6px; }
  .subtitle { color: #6b7280; font-size: 15px; font-weight: 600; margin-bottom: 28px; line-height: 1.6; }
  .status-box { border-radius: 18px; padding: 20px 18px; margin: 0 0 20px; font-size: 16px; font-weight: 700; line-height: 1.6; }
  .detecting { background: #fffbeb; color: #92400e; border: 2.5px solid #fde68a; }
  .found     { background: #f0fdf4; color: #166534; border: 2.5px solid #86efac; }
  .error     { background: #fef2f2; color: #991b1b; border: 2.5px solid #fca5a5; }
  .sending   { background: #eff6ff; color: #1e40af; border: 2.5px solid #bfdbfe; }
  .done      { background: #f0fdf4; color: #166534; border: 2.5px solid #86efac; }
  .spinner { display:inline-block; width:20px; height:20px; border:3px solid rgba(0,0,0,0.15); border-top-color:#92400e; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .btn { width:100%; padding:22px; border:none; border-radius:20px; font-size:22px; font-family:'Nunito',sans-serif; font-weight:900; cursor:pointer; transition:transform 0.12s, box-shadow 0.12s; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; }
  .btn:active { transform:scale(0.96); }
  .btn-send { background:#25D366; color:#fff; box-shadow:0 6px 28px rgba(37,211,102,0.4); }
  .btn-retry { background:#f3f4f6; color:#1a1a2e; font-size:16px; padding:16px; }
  .map-link { display:block; margin:8px auto 0; font-size:13px; font-weight:700; color:#2563eb; text-decoration:underline; }
  .note { font-size:13px; color:#6b7280; font-weight:600; margin-top:10px; line-height:1.6; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div class="card">
  <span class="icon">📍</span>
  <div class="hindi">Apna Location Bhejo</div>
  <h1>Share Your Location</h1>
  <p class="subtitle">
    Neeche wala button dabayein 🙏<br>
    <span style="font-size:13px;">(Tap the button below to share your location)</span>
  </p>

  <div class="status-box detecting" id="status">
    <span class="spinner"></span>
    Aapka location dhundha ja raha hai...<br>
    <span style="font-size:14px;">(Allow dabayein agar phone poochhe)</span>
  </div>

  <a id="map-link" class="map-link hidden" target="_blank" href="#">🗺️ Map mein dekho</a>

  <button class="btn btn-send hidden" id="send-btn" onclick="sendLocation()">
    📲 WhatsApp pe Bhejo
  </button>
  <button class="btn btn-retry hidden" id="retry-btn" onclick="detectLocation()">
    🔄 Dobara Try Karein
  </button>

  <p class="note" id="note">Phone mein location (GPS) on hona chahiye.</p>
</div>

<script>
  // The server's URL — when hosted on Railway, this will be your Railway URL
  // When testing locally, it's just empty string (same origin)
  const SERVER = '';

  let lat = null, lng = null;
  window.addEventListener('load', detectLocation);

  function detectLocation() {
    setState('detecting');
    if (!navigator.geolocation) return setState('error', 'GPS not supported');
    navigator.geolocation.getCurrentPosition(
      pos => {
        lat = pos.coords.latitude;
        lng = pos.coords.longitude;
        setState('found');
      },
      () => setState('error'),
      { enableHighAccuracy: true, timeout: 25000 }
    );
  }

  async function sendLocation() {
    if (!lat || !lng) return;
    setState('sending');

    try {
      // This is the KEY difference from the old version:
      // Instead of just opening WhatsApp, we now POST to OUR SERVER
      // The server saves it to database AND sends you a notification
      const response = await fetch(SERVER + '/location', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat, lng })
      });

      if (!response.ok) throw new Error('Server error');

      // Also open WhatsApp with the location as backup
      const mapsURL = `https://maps.google.com/?q=${lat},${lng}`;
      const msg = `Namaste! 🙏 Mera location yeh hai:\n📍 ${mapsURL}`;
      window.open(`https://wa.me/918287481934?text=${encodeURIComponent(msg)}`, '_blank');

      setState('done');
    } catch (e) {
      setState('error', 'Network error. Check internet connection.');
    }
  }

  function setState(s, msg) {
    const box = document.getElementById('status');
    const sendBtn  = document.getElementById('send-btn');
    const retryBtn = document.getElementById('retry-btn');
    const mapLink  = document.getElementById('map-link');
    const note     = document.getElementById('note');

    sendBtn.classList.add('hidden');
    retryBtn.classList.add('hidden');
    mapLink.classList.add('hidden');

    if (s === 'detecting') {
      box.className = 'status-box detecting';
      box.innerHTML = '<span class="spinner"></span> Aapka location dhundha ja raha hai...<br><span style="font-size:14px;">Please wait...</span>';
      note.textContent = 'Allow dabayein agar phone poochhe.';
    } else if (s === 'found') {
      box.className = 'status-box found';
      box.innerHTML = `✅ <strong>Location mil gaya!</strong><br><span style="font-size:13px;">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`;
      mapLink.href = `https://maps.google.com/?q=${lat},${lng}`;
      mapLink.classList.remove('hidden');
      sendBtn.classList.remove('hidden');
      note.textContent = '✅ Taiyaar hai! Neeche wala button dabayein.';
    } else if (s === 'sending') {
      box.className = 'status-box sending';
      box.innerHTML = '<span class="spinner"></span> Bheja ja raha hai... (Sending...)';
      note.textContent = 'Thoda wait karein...';
    } else if (s === 'done') {
      box.className = 'status-box done';
      box.innerHTML = '🎉 <strong>Location bhej diya!</strong><br><span style="font-size:14px;">Family ko notification aa gaya!</span>';
      note.textContent = 'Ab aap yeh page band kar sakte hain.';
    } else if (s === 'error') {
      box.className = 'status-box error';
      box.innerHTML = `❌ <strong>Location nahi mila.</strong><br><span style="font-size:14px;">${msg || 'GPS on karein aur dobara try karein.'}</span>`;
      retryBtn.classList.remove('hidden');
      note.textContent = 'Settings mein Location/GPS on karein.';
    }
  }
</script>
</body>
</html>
